# Seed recipe — the starting point of the ralph loop.
# Conservative composition: namespace migration first, framework upgrade,
# test-stack migration, then Java language modernization, finishing
# with cleanup.
#
# The orchestrator wraps this list into a rewrite.yml whose composite
# recipe is named `com.fitness.candidate.MigrateToJava21`. The composite
# is what gets passed to -Drewrite.activeRecipes at run time.

active_recipes:
  - org.openrewrite.java.migrate.jakarta.JavaxMigrationToJakarta
  - org.openrewrite.java.spring.boot3.UpgradeSpringBoot_3_3
  - org.openrewrite.hibernate.MigrateToHibernate62
  - org.openrewrite.java.testing.junit5.JUnit4to5Migration
  - org.openrewrite.java.testing.mockito.MockitoBestPractices
  - org.openrewrite.java.migrate.UpgradeToJava21
  - org.openrewrite.java.RemoveUnusedImports
