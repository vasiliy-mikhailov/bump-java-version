services:
  openhands:
    image: docker.openhands.dev/openhands/openhands:1.6
    container_name: openhands
    restart: unless-stopped
    pull_policy: never
    environment:
      SANDBOX_RUNTIME_CONTAINER_IMAGE: docker.openhands.dev/openhands/runtime:1.6-nikolaik
      # Force runtime to join proxy-net at container creation so openhands
      # can reach it by container name (e.g. openhands-runtime-<id>:port).
      # OpenHands' "additional_networks" attaches after wait_until_alive
      # which fires first and fails — too late.
      SANDBOX_DOCKER_RUNTIME_KWARGS: '{"network":"proxy-net"}'
      SANDBOX_LOCAL_RUNTIME_URL: http://openhands-runtime-{SESSION_ID}
      SANDBOX_VOLUMES: /home/vmihaylov/java_8_11_17_to_java_21:/workspace:rw
      LOG_ALL_EVENTS: "true"
      LLM_MODEL: openai/qwen3.6-27b-fp8
      LLM_BASE_URL: https://inference.mikhailov.tech/v1
      LLM_API_KEY: ${VLLM_API_KEY}
      WORKSPACE_BASE: /home/vmihaylov/java_8_11_17_to_java_21
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - openhands-state:/.openhands-state
      - /home/vmihaylov/java_8_11_17_to_java_21:/workspace
    env_file:
      - /home/vmihaylov/java_8_11_17_to_java_21/.env
    networks:
      - proxy-net
    expose:
      - "3000"

volumes:
  openhands-state:

networks:
  proxy-net:
    external: true
